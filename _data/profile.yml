bio:
  en: "Explore the world as well as our inner heart"
  zh: "探索世界，也探索我们的内心"
statement:
  en: "A gentle black sheep. I hold warmth toward others while remaining inwardly independent. I'm drawn to clear facts, vivid details, well-reasoned arguments, measured expression paired with a kind heart. I hold no claim to absolute truth, and have little patience for context-free moralizing.\n\nI believe cognition is the act of imposing order — structuring data, layering knowledge, and finding the hierarchy within chaos."
  zh: "一只羊，保持对他人的尊重和善意，内心独立有态度。喜欢清晰的事实，生动的细节，有条理的逻辑，妥善的表达和善良的心灵；知自己没有掌握真理，也厌烦被脱离场景的真理训诫。\n\n我喜欢秩序，知识要有层次，数据需要结构化，认知的过程就是不断把数据和知识进行秩序化的过程。"
