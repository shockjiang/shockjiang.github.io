- title: "oVP: Open Visual Perception"
  subtitle: "Grounding DINO 1.5/1.6 & Supervised Prompt Tuning"
  description: "Open-vocabulary detection, keypoint detection, and prompt tuning to customize detection targets with minimal labeled data. Grounding DINO 1.6 Pro achieves 55.4 AP on COCO and 57.7 AP on LVIS-minival. The Edge model runs at 14 FPS on edge devices. Supervised Prompt Tuning (SPT) enables customized detection for specialized scenarios."
  tags: ["Open-Set Detection", "Keypoint Detection", "3D Detection"]
  videos:
    - title: "Grounding DINO 1.6 Pro"
      url: "https://dds-frontend.oss-accelerate.aliyuncs.com/static_files/video/banner_grounding-dino_1.6_pro.mp4"
