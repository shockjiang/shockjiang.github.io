- title: "oVP: Optimized Visual Prompt"
  subtitle: "Supervised Prompt Tuning for Customized Detection"
  description: "oVP uses Supervised Prompt Tuning (SPT) to generate optimized visual prompts that customize open-set detection for specialized scenarios. Unlike text prompts that rely on category names, SPT learns domain-specific prompt embeddings from as few as 7 labeled images. Only prompt embeddings are updated during training — no model fine-tuning needed. SPT+Grounding DINO 1.6 consistently outperforms YOLOv8 across 12 industry domains (agriculture, construction, manufacturing, retail, etc.), with advantages intensifying as training data decreases."
  tags: ["Open-Set Detection"]
  images:
    - title: "SPT accuracy across 12 industry scenarios"
      url: "https://dds-blogs.oss-accelerate.aliyuncs.com/assets/Grounding-DINO-1.6-Pro/accur.png"
