<div class="news-list">
  {% for item in site.data.news %}
  <div class="news-item">
    <span class="news-date">{{ item.date }}</span>
    <span class="news-content">
      <span data-lang="en" style="display:none">{{ item.content.en }}</span>
      <span data-lang="zh">{{ item.content.zh }}</span>
    </span>
  </div>
  {% endfor %}
</div>
